<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureVault - Dashboard</title>
    <link rel="stylesheet" href="/dashboard.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>🔐 Secure<span>Vault</span></h1>
    <div class="nav-right">
        <span id="usernameDisplay" style="color:#aaa; font-size:14px;"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">


    <!-- UPLOAD CARD -->
    <div class="card">
        <h2>📤 Upload File</h2>
        <div class="upload-zone">
            <input type="file" id="fileInput" onchange="fileSelected()">
            <div class="icon">📁</div>
            <p>Click to choose a file or drag & drop</p>
            <div id="selectedFile"></div>
        </div>
        <div style="text-align:center;">
            <button class="upload-btn" onclick="uploadFile()">Upload File</button>
        </div>
        <div id="uploadMsg" class="msg"></div>
    </div>

    <!-- FILES LIST CARD -->
    <div class="card">
        <h2>📂 Your Files</h2>
        <div id="fileTableContainer">
            <div class="empty-state">
                <div class="icon"></div>
                <p>No files yet. Upload your first file above.</p>
            </div>
        </div>
    </div>

</div>

<script src="/dashboard.js" defer></script>
</body>
</html>
