<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureVault - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
        }
        /* NAVBAR */
        .navbar {
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 16px 32px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .navbar h1 { font-size: 20px; letter-spacing: 1px; }
        .navbar h1 span { color: #7c3aed; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .badge {
            padding: 5px 14px; border-radius: 20px;
            font-size: 12px; font-weight: bold;
        }
        .badge.level1 { background: rgba(59,130,246,0.2); color: #3b82f6; border: 1px solid #3b82f6; }
        .badge.level2 { background: rgba(239,68,68,0.2);  color: #ef4444;  border: 1px solid #ef4444; }
        .logout-btn {
            padding: 7px 16px; background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; color: #aaa; cursor: pointer;
            font-size: 13px; transition: all 0.3s;
        }
        .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

        /* MAIN */
        .main { padding: 32px; max-width: 900px; margin: 0 auto; }

        /* UPLOAD CARD */
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 28px; margin-bottom: 28px;
        }
        .card h2 { font-size: 16px; color: #ccc; margin-bottom: 20px; }

        .upload-zone {
            border: 2px dashed rgba(124,58,237,0.4);
            border-radius: 12px; padding: 32px;
            text-align: center; cursor: pointer;
            transition: border-color 0.3s;
            position: relative;
        }
        .upload-zone:hover { border-color: #7c3aed; }
        .upload-zone input[type=file] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }
        .upload-zone p { color: #aaa; font-size: 14px; }
        .upload-zone .icon { font-size: 36px; margin-bottom: 10px; }
        #selectedFile { color: #7c3aed; font-size: 13px; margin-top: 10px; }

        .upload-btn {
            margin-top: 16px; padding: 11px 28px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none; border-radius: 8px; color: #fff;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: opacity 0.3s;
        }
        .upload-btn:hover { opacity: 0.85; }

        /* ACCESS LEVEL INFO */
        .info-box {
            padding: 12px 18px; border-radius: 10px; margin-bottom: 20px;
            font-size: 13px; display: flex; align-items: center; gap: 10px;
        }
        .info-box.level1 { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #3b82f6; }
        .info-box.level2 { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #ef4444; }

        /* FILES TABLE */
        table { width: 100%; border-collapse: collapse; }
        thead tr { border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { padding: 12px 16px; text-align: left; font-size: 12px; color: #888; text-transform: uppercase; }
        td { padding: 14px 16px; font-size: 13px; color: #ddd; border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr:hover td { background: rgba(255,255,255,0.03); }
        .file-name { color: #fff; font-weight: 500; }
        .enc-badge {
            padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold;
        }
        .enc-yes { background: rgba(239,68,68,0.2); color: #ef4444; }
        .enc-no  { background: rgba(107,114,128,0.2); color: #9ca3af; }
        .download-btn {
            padding: 5px 14px; background: rgba(124,58,237,0.2);
            border: 1px solid rgba(124,58,237,0.4);
            border-radius: 6px; color: #7c3aed;
            cursor: pointer; font-size: 12px; transition: all 0.3s;
        }
        .download-btn:hover { background: rgba(124,58,237,0.4); }
        .empty-state { text-align: center; padding: 40px; color: #555; }
        .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

        /* 2FA TOGGLE */
        .toggle-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .toggle-label { font-size: 14px; color: #ccc; }
        .toggle-label small { display: block; color: #666; font-size: 12px; margin-top: 3px; }
        .toggle-btn {
            padding: 8px 22px; border: none; border-radius: 20px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .toggle-btn.enable  { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid #10b981; }
        .toggle-btn.disable { background: rgba(239,68,68,0.2);  color: #ef4444;  border: 1px solid #ef4444; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.on  { background: #10b981; }
        .status-dot.off { background: #555; }

        /* MSG */
        .msg {
            padding: 12px 16px; border-radius: 8px;
            font-size: 13px; margin-top: 12px; display: none;
        }
        .msg.success { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); display: block; }
        .msg.error   { background: rgba(239,68,68,0.15);  color: #ef4444;  border: 1px solid rgba(239,68,68,0.3);  display: block; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>🔐 Secure<span>Vault</span></h1>
    <div class="nav-right">
        <span id="usernameDisplay" style="color:#aaa; font-size:14px;"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- 2FA SETTINGS CARD -->
    <div class="card">
        <h2>🛡️ Two-Factor Authentication (2FA)</h2>
        <div class="toggle-row">
            <div class="toggle-label">
                <span class="status-dot" id="2faStatusDot"></span>
                Status: <strong id="2faStatusText">Loading...</strong>
                <small>When enabled, a 6-digit OTP will be sent to your email on every login.</small>
            </div>
            <button class="toggle-btn" id="2faToggleBtn" onclick="toggle2FA()">...</button>
        </div>
        <div id="2faMsg" class="msg" style="margin-top:12px;"></div>
    </div>

    <!-- UPLOAD CARD -->
    <div class="card">
        <h2>📤 Upload File</h2>
        <div class="upload-zone">
            <input type="file" id="fileInput" onchange="fileSelected()">
            <div class="icon">📁</div>
            <p>Click to choose a file or drag & drop</p>
            <div id="selectedFile"></div>
        </div>
        <div style="text-align:center;">
            <button class="upload-btn" onclick="uploadFile()">Upload File</button>
        </div>
        <div id="uploadMsg" class="msg"></div>
    </div>

    <!-- FILES LIST CARD -->
    <div class="card">
        <h2>📂 Your Files</h2>
        <div id="fileTableContainer">
            <div class="empty-state">
                <div class="icon">📭</div>
                <p>No files yet. Upload your first file above.</p>
            </div>
        </div>
    </div>

</div>

<script>
    const token = localStorage.getItem('token');
    const accessLevel = localStorage.getItem('accessLevel');
    const username = localStorage.getItem('username');

    // Redirect to login if no token
    if (!token) window.location.href = '/index.html';

    // Setup UI based on access level
    window.onload = function () {
        document.getElementById('usernameDisplay').textContent = '👤 ' + username;
        load2FAStatus();
        loadFiles();
    };

    // ── 2FA functions ─────────────────────────────────────────────
    async function load2FAStatus() {
        try {
            const res = await fetch('/auth/2fa-status', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const enabled = await res.json();
            update2FAUI(enabled);
        } catch (e) {
            console.error('Failed to load 2FA status', e);
        }
    }

    function update2FAUI(enabled) {
        const dot  = document.getElementById('2faStatusDot');
        const text = document.getElementById('2faStatusText');
        const btn  = document.getElementById('2faToggleBtn');
        if (enabled) {
            dot.className  = 'status-dot on';
            text.textContent = 'Enabled ✅';
            btn.textContent  = 'Disable 2FA';
            btn.className    = 'toggle-btn disable';
        } else {
            dot.className  = 'status-dot off';
            text.textContent = 'Disabled';
            btn.textContent  = 'Enable 2FA';
            btn.className    = 'toggle-btn enable';
        }
    }

    async function toggle2FA() {
        const msg = document.getElementById('2faMsg');
        const isEnabled = document.getElementById('2faStatusText').textContent.includes('Enabled');
        const endpoint = isEnabled ? '/auth/disable-2fa' : '/auth/enable-2fa';

        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const result = await res.text();

            if (result === 'NO_EMAIL') {
                showMsg(msg, '⚠️ No email address on your account. Please register with an email to use 2FA.', 'error');
                return;
            }
            showMsg(msg, result.includes('enabled') ? '✅ ' + result : '🔓 ' + result,
                        result.includes('enabled') ? 'success' : 'error');
            load2FAStatus();
        } catch (e) {
            showMsg(msg, 'Error: ' + e.message, 'error');
        }
    }
    // ─────────────────────────────────────────────────────────────

    function fileSelected() {
        const file = document.getElementById('fileInput').files[0];
        document.getElementById('selectedFile').textContent = file ? '✅ ' + file.name : '';
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const msg = document.getElementById('uploadMsg');

        if (!fileInput.files[0]) {
            showMsg(msg, 'Please select a file first', 'error'); return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const res = await fetch('/files/upload', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body: formData
            });
            const result = await res.text();
            showMsg(msg, result, res.ok ? 'success' : 'error');
            if (res.ok) {
                fileInput.value = '';
                document.getElementById('selectedFile').textContent = '';
                loadFiles();
            }
        } catch (e) {
            showMsg(msg, 'Upload failed: ' + e.message, 'error');
        }
    }

    async function loadFiles() {
        try {
            const res = await fetch('/files/list', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const files = await res.json();
            renderFiles(files);
        } catch (e) {
            console.error('Failed to load files', e);
        }
    }

    function renderFiles(files) {
        const container = document.getElementById('fileTableContainer');
        if (!files || files.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>No files yet. Upload your first file above.</p>
                </div>`;
            return;
        }

        let rows = files.map(f => `
            <tr>
                <td class="file-name">📄 ${f.originalName}</td>
                <td>${f.accessLevel === 'LEVEL2'
                    ? '<span class="enc-badge enc-yes">🔒 Encrypted</span>'
                    : '<span class="enc-badge enc-no">📄 Normal</span>'}</td>
                <td>${new Date(f.uploadTime).toLocaleString()}</td>
                <td>
                    <button class="download-btn" onclick="downloadFile(${f.id}, '${f.originalName}')">
                        ⬇ Download
                    </button>
                </td>
            </tr>
        `).join('');

        container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>File Name</th>
                        <th>Type</th>
                        <th>Uploaded</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    async function downloadFile(id, name) {
        try {
            const res = await fetch('/files/download/' + id, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!res.ok) { alert('Access denied or file not found'); return; }
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
            URL.revokeObjectURL(url);
        } catch (e) {
            alert('Download failed: ' + e.message);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/index.html';
    }

    function showMsg(el, text, type) {
        el.textContent = text;
        el.className = 'msg ' + type;
    }
</script>
</body>
</html>
