<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureVault - Login</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container">
    <div class="logo">
        <h1> SecureVault</h1>
        <p>Multi-Level Secure File Storage</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('login')">Login</div>
        <div class="tab" onclick="showTab('register')">Register</div>
        <div class="tab" onclick="showTab('forgot')">Forgot Password</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <div class="form-group">
            <label for="loginUsername">Username</label>
            <input type="text" id="loginUsername" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password">
        </div>
        <div class="hint" id="loginHint">Use your account password to sign in.</div>

        <button class="btn" onclick="login()">Login</button>
        <div id="loginMsg" class="msg"></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
        <div class="form-group">
            <label for="regUsername">Username</label>
            <input type="text" id="regUsername" placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label for="regPassword1">Password</label>
            <input type="password" id="regPassword1" placeholder="Create your account password">
        </div>
        <div class="form-group">
            <label for="regPassword2">Extra Password</label>
            <input type="password" id="regPassword2" placeholder="Create your extra password">
        </div>
        <div class="form-group">
            <label for="regSecurityQuestion1">Security Question 1</label>
            <select id="regSecurityQuestion1">
                <option value="">-- Select a question --</option>
                <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                <option value="What city were you born in?">What city were you born in?</option>
                <option value="What was the name of your primary school?">What was the name of your primary school?</option>
                <option value="What is your favourite movie?">What is your favourite movie?</option>
            </select>
        </div>
        <div class="form-group">
            <label for="regSecurityAnswer1">Security Answer 1</label>
            <input type="text" id="regSecurityAnswer1" placeholder="Your answer (case-insensitive)">
        </div>
        <div class="form-group">
            <label for="regSecurityQuestion2">Security Question 2</label>
            <select id="regSecurityQuestion2">
                <option value="">-- Select a question --</option>
                <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                <option value="What city were you born in?">What city were you born in?</option>
                <option value="What was the name of your primary school?">What was the name of your primary school?</option>
                <option value="What is your favourite movie?">What is your favourite movie?</option>
            </select>
        </div>
        <div class="form-group">
            <label for="regSecurityAnswer2">Security Answer 2</label>
            <input type="text" id="regSecurityAnswer2" placeholder="Your answer (case-insensitive)">
        </div>
        <div class="hint">Use the two security questions to recover your account credentials.</div>
        <button class="btn" onclick="register()">Register</button>
        <div id="registerMsg" class="msg"></div>
    </div>

    <!-- FORGOT PASSWORD FORM -->
    <div id="forgotForm" class="hidden">
        <div class="form-group">
            <label for="forgotUsername">Username</label>
            <input type="text" id="forgotUsername" placeholder="Enter your username">
            <button class="btn compact" onclick="loadQuestion()">Get Security Question</button>
        </div>
        <div id="questionBox" class="hidden">
            <div class="form-group">
                <label for="recoveryQuestion">Security Question</label>
                <select id="recoveryQuestion"></select>
            </div>
            <div class="form-group">
                <label for="forgotAnswer">Your Answer</label>
                <input type="text" id="forgotAnswer" placeholder="Enter your answer">
            </div>
            <div class="form-group">
                <label for="forgotNewPassword">New Access Code</label>
                <input type="password" id="forgotNewPassword" placeholder="Set a new access code">
            </div>
            <button class="btn" onclick="recoverByQuestion()">Recover Account</button>
        </div>
        <div id="forgotMsg" class="msg"></div>
    </div>
</div>

<script src="/app.js" defer></script>
</body>
</html>
