<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureVault - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #fff; font-size: 28px; letter-spacing: 2px; }
        .logo p { color: #aaa; font-size: 13px; margin-top: 6px; }
        .tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab {
            flex: 1; padding: 10px; text-align: center; cursor: pointer;
            color: #aaa; font-size: 14px; border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .tab.active { color: #7c3aed; border-bottom: 2px solid #7c3aed; }
        .form-group { margin-bottom: 18px; }
        label { color: #ccc; font-size: 13px; display: block; margin-bottom: 6px; }
        input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; color: #fff; font-size: 14px;
            outline: none; transition: border 0.3s;
        }
        input:focus { border-color: #7c3aed; }
        .btn {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none; border-radius: 8px; color: #fff;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: opacity 0.3s; margin-top: 8px;
        }
        .btn:hover { opacity: 0.85; }
        .msg {
            margin-top: 16px; padding: 12px; border-radius: 8px;
            font-size: 13px; text-align: center; display: none;
        }
        .msg.success { background: rgba(16,185,129,0.2); color: #10b981; display: block; }
        .msg.error   { background: rgba(239,68,68,0.2);  color: #ef4444;  display: block; }
        .level-badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: bold; margin-left: 8px;
        }
        .level1 { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .level2 { background: rgba(239,68,68,0.2);  color: #ef4444; }
        .hidden { display: none; }
        .otp-input {
            letter-spacing: 8px; font-size: 22px; text-align: center;
            font-weight: bold; color: #7c3aed;
        }
        .info-box {
            background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3);
            border-radius: 8px; padding: 12px; color: #c4b5fd; font-size: 13px;
            margin-bottom: 16px; text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <h1>🔐 SecureVault</h1>
        <p>Multi-Level Secure File Storage</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('login')">Login</div>
        <div class="tab" onclick="showTab('register')">Register</div>
        <div class="tab" onclick="showTab('forgot')">Forgot Password</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUsername" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password">
        </div>
        <button class="btn" onclick="login()">Login</button>
        <div id="loginMsg" class="msg"></div>
    </div>

    <!-- OTP VERIFICATION FORM (shown when 2FA is required) -->
    <div id="otpForm" class="hidden">
        <div class="info-box">
            📧 A 6-digit OTP has been sent to your registered email.<br>
            It expires in <strong>5 minutes</strong>.
        </div>
        <div class="form-group">
            <label>Enter OTP</label>
            <input type="text" id="otpInput" class="otp-input" placeholder="000000" maxlength="6">
        </div>
        <button class="btn" onclick="verifyOtp()">Verify OTP</button>
        <button class="btn" onclick="cancelOtp()"
                style="background:rgba(255,255,255,0.08);margin-top:8px;">← Back to Login</button>
        <div id="otpMsg" class="msg"></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="regUsername" placeholder="Choose a username">
        </div>
        <div class="form-group">
            <label>Password 1</label>
            <input type="password" id="regPassword1" placeholder="Password for normal files">
        </div>
        <div class="form-group">
            <label>Password 2</label>
            <input type="password" id="regPassword2" placeholder="Password for secure files">
        </div>
        <div class="form-group">
            <label>Security Question</label>
            <select id="regSecurityQuestion" style="width:100%;padding:12px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:14px;outline:none;">
                <option value="" style="background:#1a1a2e;">-- Select a question --</option>
                <option value="What was the name of your first pet?" style="background:#1a1a2e;">What was the name of your first pet?</option>
                <option value="What is your mother's maiden name?" style="background:#1a1a2e;">What is your mother's maiden name?</option>
                <option value="What city were you born in?" style="background:#1a1a2e;">What city were you born in?</option>
                <option value="What was the name of your primary school?" style="background:#1a1a2e;">What was the name of your primary school?</option>
                <option value="What is your favourite movie?" style="background:#1a1a2e;">What is your favourite movie?</option>
            </select>
        </div>
        <div class="form-group">
            <label>Security Answer</label>
            <input type="text" id="regSecurityAnswer" placeholder="Your answer (case-insensitive)">
        </div>
        <div class="form-group">
            <label>Email Address <span style="color:#7c3aed;font-size:11px;">(optional — required for 2FA)</span></label>
            <input type="email" id="regEmail" placeholder="your@email.com">
        </div>
        <button class="btn" onclick="register()">Register</button>
        <div id="registerMsg" class="msg"></div>
    </div>

    <!-- FORGOT PASSWORD FORM -->
    <div id="forgotForm" class="hidden">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="forgotUsername" placeholder="Enter your username">
            <button class="btn" onclick="loadQuestion()" style="margin-top:8px;padding:9px;">Get Security Question</button>
        </div>
        <div id="questionBox" class="hidden">
            <div class="form-group">
                <label>Security Question</label>
                <div id="questionText" style="color:#7c3aed;font-size:14px;padding:10px 0;"></div>
            </div>
            <div class="form-group">
                <label>Your Answer</label>
                <input type="text" id="forgotAnswer" placeholder="Enter your answer">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="forgotNewPassword" placeholder="Set a new password">
            </div>
            <button class="btn" onclick="resetPassword()">Reset Password</button>
        </div>
        <div id="forgotMsg" class="msg"></div>
    </div>
</div>

<script>
    let pending2FAUsername = null;  // stores username while waiting for OTP

    function showTab(tab) {
        document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
        document.getElementById('otpForm').classList.add('hidden');
        document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
        document.getElementById('forgotForm').classList.toggle('hidden', tab !== 'forgot');
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active',
                (tab === 'login'    && i === 0) ||
                (tab === 'register' && i === 1) ||
                (tab === 'forgot'   && i === 2)
            );
        });
    }

    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const msg = document.getElementById('loginMsg');

        if (!username || !password) {
            showMsg(msg, 'Please fill in all fields', 'error'); return;
        }

        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const result = await res.text();

            if (result.startsWith('2FA_REQUIRED:')) {
                // 2FA is active — show OTP verification form
                pending2FAUsername = result.split(':')[1];
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('otpForm').classList.remove('hidden');
                document.getElementById('otpInput').value = '';
                document.getElementById('otpMsg').className = 'msg';
                return;
            }

            if (result.startsWith('EMAIL_ERROR')) {
                showMsg(msg, '⚠️ 2FA is enabled but email could not be sent. Check server mail settings in application.properties.', 'error');
                return;
            }

            if (result.startsWith('ey')) {
                localStorage.setItem('token', result);
                const payload = JSON.parse(atob(result.split('.')[1]));
                localStorage.setItem('accessLevel', payload.accessLevel);
                localStorage.setItem('username', username);
                showMsg(msg, 'Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 1000);
            } else {
                showMsg(msg, result, 'error');
            }
        } catch (e) {
            showMsg(msg, 'Connection error. Is the server running?', 'error');
        }
    }

    async function verifyOtp() {
        const otp = document.getElementById('otpInput').value.trim();
        const msg = document.getElementById('otpMsg');

        if (!otp || otp.length !== 6) {
            showMsg(msg, 'Please enter the 6-digit OTP', 'error'); return;
        }

        try {
            const res = await fetch('/auth/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: pending2FAUsername, otp })
            });
            const result = await res.text();

            if (result.startsWith('ey')) {
                localStorage.setItem('token', result);
                const payload = JSON.parse(atob(result.split('.')[1]));
                localStorage.setItem('accessLevel', payload.accessLevel);
                localStorage.setItem('username', pending2FAUsername);
                pending2FAUsername = null;
                showMsg(msg, '✅ OTP verified! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 1000);
            } else {
                showMsg(msg, '❌ ' + result, 'error');
            }
        } catch (e) {
            showMsg(msg, 'Connection error', 'error');
        }
    }

    function cancelOtp() {
        pending2FAUsername = null;
        document.getElementById('otpForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('loginMsg').className = 'msg';
    }

    async function register() {
        const username         = document.getElementById('regUsername').value.trim();
        const password1        = document.getElementById('regPassword1').value.trim();
        const password2        = document.getElementById('regPassword2').value.trim();
        const securityQuestion = document.getElementById('regSecurityQuestion').value;
        const securityAnswer   = document.getElementById('regSecurityAnswer').value.trim();
        const email            = document.getElementById('regEmail').value.trim();
        const msg = document.getElementById('registerMsg');

        if (!username || !password1 || !password2 || !securityQuestion || !securityAnswer) {
            showMsg(msg, 'Please fill in all fields including security question', 'error'); return;
        }
        if (password1 === password2) {
            showMsg(msg, 'Password 1 and Password 2 must be different', 'error'); return;
        }

        try {
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password1, password2, securityQuestion, securityAnswer, email })
            });
            const result = await res.text();
            if (result.includes('successfully')) {
                showMsg(msg, result + ' — You can now login!', 'success');
            } else {
                showMsg(msg, result, 'error');
            }
        } catch (e) {
            showMsg(msg, 'Connection error. Is the server running?', 'error');
        }
    }

    async function loadQuestion() {
        const username = document.getElementById('forgotUsername').value.trim();
        const msg      = document.getElementById('forgotMsg');
        if (!username) { showMsg(msg, 'Enter your username first', 'error'); return; }

        try {
            const res      = await fetch('/auth/security-question?username=' + encodeURIComponent(username));
            const question = await res.text();

            if (question === 'USER_NOT_FOUND') {
                showMsg(msg, '❌ No account found with that username.', 'error');
                document.getElementById('questionBox').classList.add('hidden');
                return;
            }
            if (question === 'NO_SECURITY_QUESTION') {
                showMsg(msg, '⚠️ This account has no security question. Please contact admin.', 'error');
                document.getElementById('questionBox').classList.add('hidden');
                return;
            }

            document.getElementById('questionText').textContent = '❓ ' + question;
            document.getElementById('questionBox').classList.remove('hidden');
            msg.className = 'msg';
        } catch (e) {
            showMsg(msg, 'Connection error', 'error');
        }
    }

    async function resetPassword() {
        const username    = document.getElementById('forgotUsername').value.trim();
        const answer      = document.getElementById('forgotAnswer').value.trim();
        const newPassword = document.getElementById('forgotNewPassword').value.trim();
        const msg = document.getElementById('forgotMsg');

        if (!answer || !newPassword) {
            showMsg(msg, 'Please fill in all fields', 'error'); return;
        }

        try {
            const res = await fetch('/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, securityAnswer: answer, newPassword })
            });
            const result = await res.text();
            if (result.includes('successful')) {
                showMsg(msg, '✅ ' + result, 'success');
                document.getElementById('questionBox').classList.add('hidden');
                setTimeout(() => showTab('login'), 2500);
            } else {
                showMsg(msg, '❌ ' + result, 'error');
            }
        } catch (e) {
            showMsg(msg, 'Connection error', 'error');
        }
    }


    function showMsg(el, text, type) {
        el.textContent = text;
        el.className = 'msg ' + type;
    }
</script>
</body>
</html>
